<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장애물 경주</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d1a;
      --track: #1a1a2e;
      --card: #16213e;
      --border: #e94560;
      --accent: #f5a623;
      --green: #0f9b58;
      --red: #e94560;
      --text: #eaeaea;
      --muted: #8888aa;
      --btn-bg: #1a1a2e;
      --btn-border: #e94560;
      --btn-hover: #e94560;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nanum Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 배경 별 효과 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      padding: 20px;
    }

    /* 진행바 */
    #progress-wrap {
      margin-bottom: 16px;
      display: none;
    }
    #progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    #progress-bar-bg {
      height: 8px;
      background: #222;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #333;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--accent));
      border-radius: 4px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* 인벤토리 */
    #inventory {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      min-height: 32px;
    }
    .item-badge {
      background: #222;
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--accent);
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* 메인 카드 */
    .scene {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 0 40px rgba(233,69,96,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shakeIn {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
    .scene.shake { animation: shakeIn 0.4s ease; }

    /* 이모지 아이콘 */
    .scene-icon {
      font-size: 48px;
      text-align: center;
      margin-bottom: 16px;
      line-height: 1;
    }

    /* 스텝 뱃지 */
    .step-badge {
      display: inline-block;
      background: var(--border);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* 제목 */
    .scene-title {
      font-family: 'Jua', sans-serif;
      font-size: 22px;
      line-height: 1.5;
      margin-bottom: 28px;
      color: #fff;
      word-break: keep-all;
    }

    /* 선택지 버튼 */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .choice-btn {
      background: var(--btn-bg);
      border: 2px solid #333;
      border-radius: 10px;
      color: var(--text);
      font-family: 'Nanum Gothic', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 20px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      word-break: keep-all;
    }
    .choice-btn:hover {
      border-color: var(--border);
      background: rgba(233,69,96,0.08);
      transform: translateX(4px);
      color: #fff;
    }
    .choice-btn .choice-key {
      background: var(--border);
      color: #fff;
      border-radius: 6px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .choice-btn.hidden-item .choice-key {
      background: var(--accent);
    }
    .choice-btn.hidden-item {
      border-color: var(--accent);
      background: rgba(245,166,35,0.05);
    }
    .choice-btn.hidden-item:hover {
      background: rgba(245,166,35,0.12);
      border-color: var(--accent);
    }

    /* 단일 액션 버튼 */
    .action-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: var(--border);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Jua', sans-serif;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .action-btn:hover {
      background: #c73652;
      transform: scale(1.02);
    }
    .action-btn.green {
      background: var(--green);
    }
    .action-btn.green:hover { background: #0a7d47; }

    /* 결과 메시지 (오답/정답 피드백) */
    .result-msg {
      font-size: 17px;
      font-weight: 800;
      color: var(--red);
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.5;
      word-break: keep-all;
    }
    .result-msg.success { color: var(--green); }

    /* 메인 화면 */
    .main-title {
      font-family: 'Jua', sans-serif;
      font-size: 36px;
      text-align: center;
      color: #fff;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(233,69,96,0.5);
    }
    .main-sub {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .start-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: var(--border);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Jua', sans-serif;
      font-size: 22px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(233,69,96,0.3);
    }
    .start-btn:hover {
      background: #c73652;
      transform: scale(1.03);
      box-shadow: 0 6px 32px rgba(233,69,96,0.5);
    }

    /* 결승선 */
    .finish-time {
      font-family: 'Jua', sans-serif;
      font-size: 28px;
      text-align: center;
      color: var(--accent);
      margin: 12px 0 8px;
    }
    .finish-sub {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* 수식 */
    .math-block {
      background: #0a0a18;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 14px;
      color: var(--accent);
      margin-bottom: 20px;
      line-height: 1.8;
      font-family: 'Nanum Gothic', monospace;
    }

    @media (max-width: 480px) {
      .scene { padding: 24px 18px; }
      .main-title { font-size: 28px; }
      .scene-title { font-size: 18px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="progress-wrap">
    <div id="progress-label">진행도</div>
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
  </div>
  <div id="inventory"></div>
  <div id="scene-container"></div>
</div>

<script>
// ────────────────────────────────────────────
//  게임 상태
// ────────────────────────────────────────────
const state = {
  inventory: [],          // 아이템 목록
  currentScene: 'main',
};

const TOTAL_STEPS = 8;

// ────────────────────────────────────────────
//  씬 정의
// ────────────────────────────────────────────
const scenes = {

  // ── 메인 화면 ──────────────────────────────
  main: {
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">🏃</div>
          <div class="main-title">장애물 경주</div>
          <div class="main-sub">선택의 연속! 과연 결승선까지 도달할 수 있을까?<br>잘못된 선택은 처음으로 돌아가게 된다...</div>
          <button class="start-btn" onclick="goTo('q1')">🚩 게임 시작!</button>
        </div>`;
    },
    progress: 0,
  },

  // ── Q1 ────────────────────────────────────
  q1: {
    progress: 1,
    render() {
      return `
        <div class="scene">
          <div class="step-badge">STAGE 1 / ${TOTAL_STEPS}</div>
          <div class="scene-icon">🔀</div>
          <div class="scene-title">출발선에서 트랙이 갈린다!<br>어느 쪽으로 달릴까?</div>
          <div class="choices">
            <button class="choice-btn" onclick="goTo('q1_fail')">
              <span class="choice-key">A</span> 왼쪽으로 달린다
            </button>
            <button class="choice-btn" onclick="goTo('q2')">
              <span class="choice-key">B</span> 오른쪽으로 달린다
            </button>
          </div>
        </div>`;
    },
  },
  q1_fail: {
    fail: true,
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">🪨</div>
          <div class="result-msg">돌에 걸려 넘어졌다...</div>
          <button class="action-btn" onclick="restart()">💨 처음부터 다시!</button>
        </div>`;
    },
  },

  // ── Q2 ────────────────────────────────────
  q2: {
    progress: 2,
    render() {
      return `
        <div class="scene">
          <div class="step-badge">STAGE 2 / ${TOTAL_STEPS}</div>
          <div class="scene-icon">🔀</div>
          <div class="scene-title">두 번째 갈림길!<br>이번엔 어느 쪽으로?</div>
          <div class="choices">
            <button class="choice-btn" onclick="goTo('q3')">
              <span class="choice-key">A</span> 왼쪽으로 달린다
            </button>
            <button class="choice-btn" onclick="goTo('q2_fail')">
              <span class="choice-key">B</span> 오른쪽으로 달린다
            </button>
          </div>
        </div>`;
    },
  },
  q2_fail: {
    fail: true,
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">🚧</div>
          <div class="result-msg">너무 오른쪽으로 돌아버렸는지<br>트랙 밖이다...</div>
          <button class="action-btn" onclick="restart()">💨 처음부터 다시!</button>
        </div>`;
    },
  },

  // ── Q3 ────────────────────────────────────
  q3: {
    progress: 3,
    render() {
      return `
        <div class="scene">
          <div class="step-badge">STAGE 3 / ${TOTAL_STEPS}</div>
          <div class="scene-icon">🔀</div>
          <div class="scene-title">또 갈림길이다!<br>세 번째 선택을 해야 해!</div>
          <div class="choices">
            <button class="choice-btn" onclick="goTo('q3_fail')">
              <span class="choice-key">A</span> 왼쪽으로 달린다
            </button>
            <button class="choice-btn" onclick="goTo('q4')">
              <span class="choice-key">B</span> 오른쪽으로 달린다
            </button>
          </div>
        </div>`;
    },
  },
  q3_fail: {
    fail: true,
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">🚧</div>
          <div class="result-msg">너무 왼쪽으로 돌아버렸는지<br>트랙 밖이다...</div>
          <button class="action-btn" onclick="restart()">💨 처음부터 다시!</button>
        </div>`;
    },
  },

  // ── Q4 ────────────────────────────────────
  q4: {
    progress: 4,
    render() {
      return `
        <div class="scene">
          <div class="step-badge">STAGE 4 / ${TOTAL_STEPS}</div>
          <div class="scene-icon">🤸</div>
          <div class="scene-title">야생의 뜀틀이 나왔다!<br>어떻게 할까?</div>
          <div class="choices">
            <button class="choice-btn" onclick="goTo('q5')">
              <span class="choice-key">A</span> 위로 뜀틀을 넘는다
            </button>
            <button class="choice-btn" onclick="goTo('q4_fail')">
              <span class="choice-key">B</span> 그냥 지나쳐간다
            </button>
          </div>
        </div>`;
    },
  },
  q4_fail: {
    fail: true,
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">😱</div>
          <div class="result-msg">장애물을 안 넘으면 어떡해!</div>
          <button class="action-btn" onclick="restart()">💨 처음부터 다시!</button>
        </div>`;
    },
  },

  // ── Q5 ────────────────────────────────────
  q5: {
    progress: 5,
    render() {
      return `
        <div class="scene">
          <div class="step-badge">STAGE 5 / ${TOTAL_STEPS}</div>
          <div class="scene-icon">🏋️</div>
          <div class="scene-title">빈약한 체력으로나마 겨우 성공했다...<br>그런데 철봉을 마주했다! 어떻게 할까?</div>
          <div class="choices">
            <button class="choice-btn" onclick="goTo('q5_fail')">
              <span class="choice-key">A</span> 옆에 있는 장대를 들고 위로 철봉을 넘는다
            </button>
            <button class="choice-btn" onclick="goTo('q6')">
              <span class="choice-key">B</span> 그냥 아래로 숙여서 간다
            </button>
          </div>
        </div>`;
    },
  },
  q5_fail: {
    fail: true,
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">😵</div>
          <div class="result-msg">고3의 체력으로는 무리였다...</div>
          <button class="action-btn" onclick="restart()">💨 처음부터 다시!</button>
        </div>`;
    },
  },

  // ── Q6 빨간휴지 / 파란휴지 ────────────────
  q6: {
    progress: 6,
    render() {
      return `
        <div class="scene">
          <div class="step-badge">STAGE 6 / ${TOTAL_STEPS}</div>
          <div class="scene-icon">🚽</div>
          <div class="scene-title">고3의 허리는 소중한 법...<br>빨간휴지 줄까, 파란휴지 줄까?</div>
          <div class="choices">
            <button class="choice-btn" onclick="goTo('q6_red_confirm')">
              <span class="choice-key">A</span> 🔴 빨간휴지
            </button>
            <button class="choice-btn" onclick="goTo('q6_blue')">
              <span class="choice-key">B</span> 🔵 파란휴지
            </button>
          </div>
        </div>`;
    },
  },

  // 빨간휴지 확인
  q6_red_confirm: {
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">🤔</div>
          <div class="scene-title">정말로?</div>
          <div class="choices">
            <button class="choice-btn" onclick="getItem('포켓몬 피리 🎵'); goTo('q7')">
              <span class="choice-key">A</span> 네
            </button>
            <button class="choice-btn" onclick="goTo('q6_blue')">
              <span class="choice-key">B</span> 파란휴지 할래요...
            </button>
          </div>
        </div>`;
    },
  },

  // 파란휴지 분기 (화강돌 약점)
  q6_blue: {
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">💎</div>
          <div class="scene-title">화강돌의 약점은?</div>
          <div class="choices">
            <button class="choice-btn" onclick="goTo('q6_blue_fail')">
              <span class="choice-key">A</span> 악
            </button>
            <button class="choice-btn" onclick="goTo('q6_blue_fail')">
              <span class="choice-key">B</span> 고스트
            </button>
            <button class="choice-btn" onclick="getItem('포켓몬 피리 🎵'); goTo('q7')">
              <span class="choice-key">C</span> 페어리
            </button>
          </div>
        </div>`;
    },
  },
  q6_blue_fail: {
    fail: true,
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">🤡</div>
          <div class="result-msg">바보!!!</div>
          <button class="action-btn" onclick="restart()">💨 처음부터 다시!</button>
        </div>`;
    },
  },

  // ── Q7 수학 문제 ───────────────────────────
  q7: {
    progress: 7,
    render() {
      return `
        <div class="scene">
          <div class="step-badge">STAGE 7 / ${TOTAL_STEPS}</div>
          <div class="scene-icon">📐</div>
          <div class="scene-title">이번엔 수학 문제!<br>다음을 I를 사용하여 바르게 나타낸 것은?</div>
          <div class="math-block">
            정적분 I = ∫₀^∞ 1 / (1 + x⁴) dx 라 할 때,<br>
            ∫₀^∞ (1 + x²) / (1 + x⁴) dx 의 값은?
          </div>
          <div class="choices">
            <button class="choice-btn" onclick="goTo('q7_fail')">
              <span class="choice-key">A</span> (1/2)I
            </button>
            <button class="choice-btn" onclick="goTo('q7_fail')">
              <span class="choice-key">B</span> √2 I
            </button>
            <button class="choice-btn" onclick="goTo('q8')">
              <span class="choice-key">C</span> 2I
            </button>
          </div>
        </div>`;
    },
  },
  q7_fail: {
    fail: true,
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">❌</div>
          <div class="result-msg">오답!!</div>
          <button class="action-btn" onclick="restart()">💨 처음부터 다시!</button>
        </div>`;
    },
  },

  // ── Q8 잠만보 ──────────────────────────────
  q8: {
    progress: 8,
    render() {
      const hasPipe = state.inventory.includes('포켓몬 피리 🎵');
      return `
        <div class="scene">
          <div class="step-badge">STAGE 8 / ${TOTAL_STEPS}</div>
          <div class="scene-icon">😴</div>
          <div class="scene-title">잠만보가 결승선을 막고 있다...!!<br>어떻게 할까?</div>
          <div class="choices">
            <button class="choice-btn" onclick="goTo('q8_fail')">
              <span class="choice-key">A</span> 일어나달라고 빌기
            </button>
            ${hasPipe ? `
            <button class="choice-btn hidden-item" onclick="goTo('finish')">
              <span class="choice-key">B</span> ✨ 포켓몬 피리를 사용한다!
            </button>` : ''}
          </div>
        </div>`;
    },
  },
  q8_fail: {
    fail: true,
    render() {
      return `
        <div class="scene">
          <div class="scene-icon">😪</div>
          <div class="result-msg">잠만보는 미동도 하지 않는다...<br>어딘가에서 아이템을 얻을 수 있지 않을까...?</div>
          <button class="action-btn" onclick="restart()">💨 처음부터 다시!</button>
        </div>`;
    },
  },

  // ── 결승선 ─────────────────────────────────
  finish: {
    progress: 9,
    render() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      return `
        <div class="scene">
          <div class="scene-icon">🏆</div>
          <div class="result-msg success">결승선 통과!</div>
          <div class="finish-time">${h}시 ${m}분 ${s}초</div>
          <div class="finish-sub">기록을 남겼습니다! 수고했어요 🎉</div>
          <button class="action-btn green" onclick="restart()" style="margin-top:28px">🔄 다시 도전하기</button>
        </div>`;
    },
  },
};

// ────────────────────────────────────────────
//  유틸 함수
// ────────────────────────────────────────────
function goTo(sceneId) {
  state.currentScene = sceneId;
  render();
}

function restart() {
  state.inventory = [];
  state.currentScene = 'main';
  render();
}

function getItem(item) {
  if (!state.inventory.includes(item)) {
    state.inventory.push(item);
  }
}

function render() {
  const scene = scenes[state.currentScene];
  if (!scene) return;

  // 진행바
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar  = document.getElementById('progress-bar');
  if (state.currentScene === 'main') {
    progressWrap.style.display = 'none';
  } else {
    progressWrap.style.display = 'block';
    const pct = scene.progress ? Math.min((scene.progress / TOTAL_STEPS) * 100, 100) : null;
    if (pct !== null) progressBar.style.width = pct + '%';
  }

  // 인벤토리
  const inv = document.getElementById('inventory');
  inv.innerHTML = state.inventory.map(item =>
    `<span class="item-badge">🎒 ${item}</span>`
  ).join('');

  // 씬 렌더
  const container = document.getElementById('scene-container');
  container.innerHTML = scene.render();

  // 실패 씬 흔들림 효과
  if (scene.fail) {
    const el = container.querySelector('.scene');
    if (el) {
      el.classList.remove('shake');
      void el.offsetWidth; // reflow
      el.classList.add('shake');
    }
  }

  // 스크롤 맨 위로
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ────────────────────────────────────────────
//  초기 실행
// ────────────────────────────────────────────
render();
</script>
</body>
</html>
